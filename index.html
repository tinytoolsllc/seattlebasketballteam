        @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&family=Bebas+Neue&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #00653A;
            color: #FFC200;
            font-family: 'Oswald', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Retro court lines background */
        body::before {
            content: '';
            position: absolute;
            inset: 0;
            background:
                radial-gradient(ellipse 300px 300px at 50% 55%, transparent 60%, rgba(0, 80, 45, 0.6) 61%, transparent 62%),
                linear-gradient(rgba(255, 194, 0, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 194, 0, 0.03) 1px, transparent 1px);
            background-size: 100% 100%, 40px 40px, 40px 40px;
            pointer-events: none;
        }

        .container {
            text-align: center;
            z-index: 1;
            padding: 2rem;
        }

        .skyline {
            font-size: clamp(0.7rem, 1.5vw, 0.9rem);
            letter-spacing: 0.5em;
            text-transform: uppercase;
            color: rgba(255, 194, 0, 0.5);
            margin-bottom: 1rem;
            font-weight: 400;
        }

        h1 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: clamp(3.5rem, 12vw, 10rem);
            line-height: 0.9;
            letter-spacing: 0.03em;
            text-transform: uppercase;
            color: #FFC200;
            text-shadow:
                3px 3px 0 rgba(0, 0, 0, 0.3),
                0 0 40px rgba(255, 194, 0, 0.15);
            margin-bottom: 0.5rem;
        }

        h1 span {
            display: block;
        }

        .year {
            font-family: 'Bebas Neue', sans-serif;
            font-size: clamp(1rem, 3vw, 1.8rem);
            letter-spacing: 0.3em;
            color: #fff;
            opacity: 0.4;
            margin-bottom: 2.5rem;
        }

        .divider {
            width: 80px;
            height: 3px;
            background: #FFC200;
            margin: 0 auto 2.5rem;
            opacity: 0.6;
        }

        .tagline {
            font-size: clamp(1rem, 3vw, 1.6rem);
            letter-spacing: 0.25em;
            text-transform: uppercase;
            color: #fff;
            font-weight: 700;
            animation: pulse 3s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.7; }
            50% { opacity: 1; }
        }

        .badge {
            margin-top: 3rem;
            display: inline-block;
            border: 2px solid rgba(255, 194, 0, 0.3);
            padding: 0.6rem 2rem;
            font-size: clamp(0.6rem, 1.2vw, 0.75rem);
            letter-spacing: 0.4em;
            text-transform: uppercase;
            color: rgba(255, 194, 0, 0.4);
        }

        /* Retro corner accents */
        .corner {
            position: fixed;
            width: 60px;
            height: 60px;
            border-color: rgba(255, 194, 0, 0.15);
            border-style: solid;
            border-width: 0;
        }
        .corner--tl { top: 20px; left: 20px; border-top-width: 3px; border-left-width: 3px; }
        .corner--tr { top: 20px; right: 20px; border-top-width: 3px; border-right-width: 3px; }
        .corner--bl { bottom: 20px; left: 20px; border-bottom-width: 3px; border-left-width: 3px; }
        .corner--br { bottom: 20px; right: 20px; border-bottom-width: 3px; border-right-width: 3px; }

        footer {
            position: fixed;
            bottom: 0;
            width: 100%;
            text-align: center;
            padding: 1rem;
            font-size: 0.7rem;
            letter-spacing: 0.15em;
            color: rgba(255, 194, 0, 0.35);
            z-index: 1;
        }

        footer a {
            color: rgba(255, 194, 0, 0.5);
            text-decoration: none;
        }

        footer a:hover {
            color: #FFC200;
